name: Deploy CakePHP2 to IBM Cloud (Safe)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy safely with rsync
        run: |
          rsync -azv \
            --no-perms \
            --no-owner \
            --no-group \
            --omit-dir-times \
            --exclude '.git/' \
            --exclude 'app/Config/database.php' \
            --exclude 'app/Config/core.php' \
            --exclude 'app/tmp/' \
            --exclude 'app/webroot/uploads/' \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/html
